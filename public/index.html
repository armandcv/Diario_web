<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diario Web · Anotaciones de proyectos</title>
  <!-- Markdown parser + sanitizador (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
  <style>
    /* ========== Tema oscuro ========== */
    :root {
      --bg: #0f1115;
      --bg-elev: #161a22;
      --bg-elev-2: #1d2230;
      --border: #2a2f3d;
      --text: #e6e8ee;
      --text-dim: #9aa3b2;
      --accent: #7aa2f7;
      --accent-soft: rgba(122, 162, 247, 0.15);
      --danger: #f7768e;
      --success: #9ece6a;
      --tag: #2d3349;
      --tag-text: #a9b1d6;
      --shadow: 0 4px 14px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ========== Sidebar ========== */
    aside {
      width: 260px;
      background: var(--bg-elev);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin: 6px 4px;
    }
    .project-list {
      list-style: none;
      padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .project-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text);
      transition: background 120ms ease;
      font-size: 14px;
    }
    .project-item:hover { background: var(--bg-elev-2); }
    .project-item.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }
    .project-item .del {
      opacity: 0;
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
    }
    .project-item:hover .del { opacity: 1; }
    .project-item .del:hover { color: var(--danger); }

    .new-project {
      display: flex; gap: 6px;
    }
    .new-project input {
      flex: 1;
    }

    /* ========== Inputs / Buttons ========== */
    input, textarea, select, button {
      font-family: inherit;
      font-size: 14px;
    }
    input[type="text"], textarea, select {
      background: var(--bg-elev-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 11px;
      outline: none;
      width: 100%;
      transition: border-color 120ms ease;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }
    textarea { resize: vertical; min-height: 110px; }

    button {
      background: var(--accent);
      color: #0c1020;
      border: none;
      padding: 9px 14px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 80ms ease, opacity 120ms ease;
    }
    button:hover { opacity: 0.92; }
    button:active { transform: translateY(1px); }
    button.secondary {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    button.secondary:hover { color: var(--text); border-color: var(--accent); }
    button.danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(247,118,142,0.3);
    }
    button.danger:hover { background: rgba(247,118,142,0.1); }
    button.icon {
      background: transparent;
      color: var(--text-dim);
      padding: 6px 8px;
      font-size: 16px;
    }
    button.icon:hover { color: var(--text); }

    /* ========== Main ========== */
    main {
      flex: 1;
      padding: 24px 28px;
      overflow-y: auto;
    }
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .top-bar h1 {
      font-size: 22px;
      margin: 0;
      flex: 1;
    }
    .search {
      flex: 0 0 320px;
      max-width: 50%;
    }

    /* ========== Editor ========== */
    .editor {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    .editor .row { display: flex; gap: 10px; margin-bottom: 10px; }
    .editor .row > * { flex: 1; }
    .editor .actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ========== Notes ========== */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .note-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: var(--shadow);
      transition: transform 100ms ease, border-color 120ms ease;
    }
    .note-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .note-card h3 { margin: 0; font-size: 16px; }
    .note-card .meta {
      font-size: 12px;
      color: var(--text-dim);
      display: flex; gap: 8px; align-items: center;
    }
    .note-card .content {
      font-size: 13.5px;
      color: var(--text);
      line-height: 1.55;
      max-height: 220px;
      overflow: hidden;
      position: relative;
      mask-image: linear-gradient(180deg, #000 75%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 75%, transparent 100%);
    }
    .note-card .content.expanded {
      max-height: none;
      mask-image: none;
      -webkit-mask-image: none;
    }

    /* ========== Estilos Markdown ========== */
    .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
      margin: 0.6em 0 0.3em;
      line-height: 1.25;
      color: var(--text);
    }
    .md h1 { font-size: 1.35em; }
    .md h2 { font-size: 1.2em; }
    .md h3 { font-size: 1.08em; }
    .md p { margin: 0.4em 0; }
    .md ul, .md ol { margin: 0.4em 0; padding-left: 1.4em; }
    .md li { margin: 0.15em 0; }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md code {
      background: var(--bg-elev-2);
      color: #e0af68;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.92em;
    }
    .md pre {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0.5em 0;
    }
    .md pre code {
      background: transparent;
      padding: 0;
      color: var(--text);
      font-size: 0.88em;
    }
    .md blockquote {
      border-left: 3px solid var(--accent);
      margin: 0.5em 0;
      padding: 2px 12px;
      color: var(--text-dim);
      background: var(--accent-soft);
      border-radius: 0 6px 6px 0;
    }
    .md hr { border: 0; border-top: 1px solid var(--border); margin: 0.8em 0; }
    .md table {
      border-collapse: collapse;
      margin: 0.5em 0;
      font-size: 0.92em;
    }
    .md th, .md td {
      border: 1px solid var(--border);
      padding: 5px 9px;
    }
    .md th { background: var(--bg-elev-2); }
    .md img { max-width: 100%; border-radius: 6px; }
    .md input[type="checkbox"] { margin-right: 6px; }

    .expand-toggle {
      background: transparent;
      color: var(--text-dim);
      border: none;
      padding: 4px 0;
      font-size: 12px;
      cursor: pointer;
      align-self: flex-start;
    }
    .expand-toggle:hover { color: var(--accent); }

    /* Vista previa del editor */
    .preview-pane {
      background: var(--bg-elev-2);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      min-height: 110px;
      max-height: 320px;
      overflow-y: auto;
      font-size: 14px;
    }
    .preview-pane.empty { color: var(--text-dim); font-style: italic; }
    .md-hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .md-hint code {
      background: var(--bg-elev-2);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: "SF Mono", Menlo, monospace;
    }
    .note-card .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      background: var(--tag);
      color: var(--tag-text);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      cursor: pointer;
    }
    .tag:hover { color: var(--accent); }
    .note-card .actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: auto; }

    .empty {
      text-align: center;
      color: var(--text-dim);
      padding: 40px 20px;
      border: 1px dashed var(--border);
      border-radius: 12px;
    }

    /* ========== Toast ========== */
    .toast {
      position: fixed;
      bottom: 20px; right: 20px;
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      opacity: 0; transform: translateY(10px);
      transition: opacity 200ms ease, transform 200ms ease;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-color: var(--danger); }
    .toast.success { border-color: var(--success); }

    @media (max-width: 720px) {
      body { flex-direction: column; }
      aside { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
      main { padding: 18px; }
      .search { flex: 1; max-width: 100%; }
    }
  </style>
</head>
<body>
  <aside>
    <div class="brand"><span class="dot"></span> Diario Web</div>

    <div>
      <div class="section-title">Proyectos</div>
      <ul class="project-list" id="projectList"></ul>
    </div>

    <div>
      <div class="section-title">Nuevo proyecto</div>
      <form class="new-project" id="newProjectForm">
        <input type="text" id="newProjectName" placeholder="Nombre..." maxlength="60" />
        <button type="submit">+</button>
      </form>
    </div>

    <div style="margin-top:auto; font-size: 11px; color: var(--text-dim);">
      Tus datos se guardan en <code>data.json</code>
    </div>
  </aside>

  <main>
    <div class="top-bar">
      <h1 id="currentProjectTitle">Todas las notas</h1>
      <input type="text" class="search" id="searchInput" placeholder="🔍 Buscar por título, contenido o tag..." />
    </div>

    <!-- Editor -->
    <div class="editor">
      <div class="row">
        <input type="text" id="noteTitle" placeholder="Título de la nota" />
        <input type="text" id="noteTags" placeholder="Tags separados por coma (ej: idea, urgente)" />
      </div>
      <div class="row">
        <textarea id="noteContent" placeholder="Escribe tu anotación... Soporta **Markdown** (negritas, listas, código, enlaces, etc.)"></textarea>
      </div>
      <div id="previewWrap" style="display:none; margin-bottom:10px;">
        <div class="md-hint" style="margin-bottom:6px;">Vista previa</div>
        <div class="preview-pane md" id="previewPane"></div>
      </div>
      <div class="md-hint">
        Markdown: <code>**negrita**</code> · <code>*cursiva*</code> · <code># título</code> · <code>- lista</code> · <code>[texto](url)</code> · <code>`código`</code> · <code>```bloque```</code>
      </div>
      <div class="row" style="align-items:center; margin-top:10px;">
        <select id="noteProject"></select>
        <div class="actions">
          <button class="secondary" id="previewBtn" type="button">👁 Vista previa</button>
          <button class="secondary" id="cancelEditBtn" type="button" style="display:none;">Cancelar</button>
          <button id="saveNoteBtn" type="button">Guardar nota</button>
        </div>
      </div>
    </div>

    <!-- Notas -->
    <div id="notesContainer"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
  (() => {
    // ---------- Markdown ----------
    if (window.marked) {
      marked.setOptions({
        gfm: true,        // GitHub-flavored markdown (tablas, ~~tachado~~, etc.)
        breaks: true,     // Saltos de línea simples = <br>
      });
    }
    function renderMarkdown(text) {
      if (!text) return '';
      try {
        const html = window.marked ? marked.parse(text) : escapeHtml(text);
        return window.DOMPurify ? DOMPurify.sanitize(html) : html;
      } catch (e) {
        return escapeHtml(text);
      }
    }

    const api = {
      async get(path) {
        const r = await fetch(path);
        if (!r.ok) throw new Error((await r.json()).error || r.statusText);
        return r.json();
      },
      async send(method, path, body) {
        const r = await fetch(path, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined,
        });
        if (!r.ok) {
          let msg = r.statusText;
          try { msg = (await r.json()).error || msg; } catch {}
          throw new Error(msg);
        }
        return r.json();
      },
    };

    // ---------- Estado ----------
    const state = {
      projects: [],
      notes: [],
      currentProjectId: 'all',
      search: '',
      activeTag: '',
      editingNoteId: null,
    };

    // ---------- Elementos ----------
    const $ = (sel) => document.querySelector(sel);
    const projectList = $('#projectList');
    const noteProjectSelect = $('#noteProject');
    const notesContainer = $('#notesContainer');
    const currentProjectTitle = $('#currentProjectTitle');
    const searchInput = $('#searchInput');
    const noteTitle = $('#noteTitle');
    const noteContent = $('#noteContent');
    const noteTags = $('#noteTags');
    const saveNoteBtn = $('#saveNoteBtn');
    const cancelEditBtn = $('#cancelEditBtn');
    const previewBtn = $('#previewBtn');
    const previewWrap = $('#previewWrap');
    const previewPane = $('#previewPane');
    const newProjectForm = $('#newProjectForm');
    const newProjectName = $('#newProjectName');

    // ---------- Toast ----------
    const toastEl = $('#toast');
    let toastTimer;
    function toast(msg, type = '') {
      toastEl.textContent = msg;
      toastEl.className = 'toast show ' + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toastEl.className = 'toast ' + type; }, 2400);
    }

    // ---------- Render ----------
    function renderProjects() {
      projectList.innerHTML = '';
      const items = [{ id: 'all', name: 'Todas las notas' }, ...state.projects];
      items.forEach(p => {
        const li = document.createElement('li');
        li.className = 'project-item' + (p.id === state.currentProjectId ? ' active' : '');
        li.innerHTML = `
          <span>${escapeHtml(p.name)}</span>
          ${p.id !== 'all' ? `<button class="del" title="Eliminar proyecto" data-id="${p.id}">✕</button>` : ''}
        `;
        li.addEventListener('click', (e) => {
          if (e.target.classList.contains('del')) return;
          state.currentProjectId = p.id;
          state.activeTag = '';
          renderProjects();
          loadNotes();
          currentProjectTitle.textContent = p.name;
        });
        const delBtn = li.querySelector('.del');
        if (delBtn) {
          delBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!confirm(`¿Eliminar el proyecto "${p.name}" y todas sus notas?`)) return;
            try {
              await api.send('DELETE', `/api/projects/${p.id}`);
              if (state.currentProjectId === p.id) state.currentProjectId = 'all';
              await loadProjects();
              await loadNotes();
              toast('Proyecto eliminado', 'success');
            } catch (err) { toast(err.message, 'error'); }
          });
        }
        projectList.appendChild(li);
      });

      // Actualizar select del editor
      noteProjectSelect.innerHTML = '';
      state.projects.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        noteProjectSelect.appendChild(opt);
      });
      // Pre-seleccionar el actual si aplica
      if (state.currentProjectId !== 'all') {
        noteProjectSelect.value = state.currentProjectId;
      }
    }

    function renderNotes() {
      notesContainer.innerHTML = '';
      if (!state.notes.length) {
        notesContainer.innerHTML = `<div class="empty">No hay notas todavía.<br>Escribe tu primera anotación arriba ⤴</div>`;
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'notes-grid';
      state.notes.forEach(n => {
        const project = state.projects.find(p => p.id === n.projectId);
        const card = document.createElement('div');
        card.className = 'note-card';
        card.innerHTML = `
          <h3>${escapeHtml(n.title)}</h3>
          <div class="meta">
            <span>📁 ${escapeHtml(project ? project.name : 'Sin proyecto')}</span>
            <span>·</span>
            <span>${formatDate(n.updatedAt)}</span>
          </div>
          ${n.content ? `<div class="content md" data-content>${renderMarkdown(n.content)}</div>
            <button class="expand-toggle" data-action="expand" type="button" style="display:none;">Ver más ▾</button>` : ''}
          ${(n.tags && n.tags.length) ? `<div class="tags">${n.tags.map(t => `<span class="tag" data-tag="${escapeHtml(t)}">#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
          <div class="actions">
            <button class="icon" title="Editar" data-action="edit">✏️</button>
            <button class="icon" title="Eliminar" data-action="del">🗑️</button>
          </div>
        `;
        card.querySelectorAll('.tag').forEach(el => {
          el.addEventListener('click', () => {
            state.activeTag = el.dataset.tag;
            searchInput.value = '';
            state.search = '';
            loadNotes();
            toast(`Filtrando por #${el.dataset.tag}`);
          });
        });
        // Botón "Ver más" si el contenido se desborda
        const contentEl = card.querySelector('[data-content]');
        const expandBtn = card.querySelector('[data-action="expand"]');
        if (contentEl && expandBtn) {
          // Esperamos al siguiente frame para medir
          requestAnimationFrame(() => {
            if (contentEl.scrollHeight > contentEl.clientHeight + 4) {
              expandBtn.style.display = 'inline-block';
            }
          });
          expandBtn.addEventListener('click', () => {
            const expanded = contentEl.classList.toggle('expanded');
            expandBtn.textContent = expanded ? 'Ver menos ▴' : 'Ver más ▾';
          });
        }
        card.querySelector('[data-action="edit"]').addEventListener('click', () => startEdit(n));
        card.querySelector('[data-action="del"]').addEventListener('click', async () => {
          if (!confirm(`¿Eliminar la nota "${n.title}"?`)) return;
          try {
            await api.send('DELETE', `/api/notes/${n.id}`);
            await loadNotes();
            toast('Nota eliminada', 'success');
          } catch (err) { toast(err.message, 'error'); }
        });
        grid.appendChild(card);
      });
      notesContainer.appendChild(grid);

      if (state.activeTag) {
        const banner = document.createElement('div');
        banner.style.cssText = 'margin-bottom:12px; color: var(--text-dim); font-size: 13px;';
        banner.innerHTML = `Filtrando por <span class="tag" style="cursor:default;">#${escapeHtml(state.activeTag)}</span>
          <button class="secondary" style="padding:4px 10px; margin-left:8px;">Quitar filtro</button>`;
        banner.querySelector('button').addEventListener('click', () => {
          state.activeTag = '';
          loadNotes();
        });
        notesContainer.insertBefore(banner, grid);
      }
    }

    // ---------- Carga ----------
    async function loadProjects() {
      state.projects = await api.get('/api/projects');
      renderProjects();
    }

    async function loadNotes() {
      const params = new URLSearchParams();
      if (state.currentProjectId && state.currentProjectId !== 'all') params.set('projectId', state.currentProjectId);
      if (state.search) params.set('q', state.search);
      if (state.activeTag) params.set('tag', state.activeTag);
      const qs = params.toString();
      state.notes = await api.get('/api/notes' + (qs ? '?' + qs : ''));
      renderNotes();
    }

    // ---------- Editor ----------
    function startEdit(note) {
      state.editingNoteId = note.id;
      noteTitle.value = note.title;
      noteContent.value = note.content || '';
      noteTags.value = (note.tags || []).join(', ');
      noteProjectSelect.value = note.projectId;
      saveNoteBtn.textContent = 'Actualizar nota';
      cancelEditBtn.style.display = 'inline-block';
      updatePreview();
      noteTitle.focus();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function clearEditor() {
      state.editingNoteId = null;
      noteTitle.value = '';
      noteContent.value = '';
      noteTags.value = '';
      saveNoteBtn.textContent = 'Guardar nota';
      cancelEditBtn.style.display = 'none';
      updatePreview();
    }

    async function saveNote() {
      const title = noteTitle.value.trim();
      const content = noteContent.value;
      const tags = noteTags.value.split(',').map(t => t.trim()).filter(Boolean);
      const projectId = noteProjectSelect.value;
      if (!title) { toast('Falta el título', 'error'); return; }
      if (!projectId) { toast('Selecciona un proyecto', 'error'); return; }
      try {
        if (state.editingNoteId) {
          await api.send('PUT', `/api/notes/${state.editingNoteId}`, { title, content, tags, projectId });
          toast('Nota actualizada', 'success');
        } else {
          await api.send('POST', '/api/notes', { title, content, tags, projectId });
          toast('Nota guardada', 'success');
        }
        clearEditor();
        await loadNotes();
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    // ---------- Vista previa Markdown ----------
    let previewOpen = false;
    function updatePreview() {
      if (!previewOpen) return;
      const txt = noteContent.value;
      if (!txt.trim()) {
        previewPane.classList.add('empty');
        previewPane.textContent = 'Escribe algo para ver la vista previa...';
      } else {
        previewPane.classList.remove('empty');
        previewPane.innerHTML = renderMarkdown(txt);
      }
    }
    previewBtn.addEventListener('click', () => {
      previewOpen = !previewOpen;
      previewWrap.style.display = previewOpen ? 'block' : 'none';
      previewBtn.textContent = previewOpen ? '✕ Ocultar preview' : '👁 Vista previa';
      updatePreview();
    });
    noteContent.addEventListener('input', updatePreview);

    // ---------- Listeners ----------
    saveNoteBtn.addEventListener('click', saveNote);
    cancelEditBtn.addEventListener('click', clearEditor);

    newProjectForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = newProjectName.value.trim();
      if (!name) return;
      try {
        await api.send('POST', '/api/projects', { name });
        newProjectName.value = '';
        await loadProjects();
        toast('Proyecto creado', 'success');
      } catch (err) {
        toast(err.message, 'error');
      }
    });

    let searchTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        state.search = searchInput.value.trim();
        loadNotes();
      }, 200);
    });

    // Atajo: Cmd/Ctrl + Enter para guardar
    [noteTitle, noteContent, noteTags].forEach(el => {
      el.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
          e.preventDefault();
          saveNote();
        }
      });
    });

    // ---------- Helpers ----------
    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString('es-MX', { dateStyle: 'medium', timeStyle: 'short' });
    }

    // ---------- Init ----------
    (async () => {
      try {
        await loadProjects();
        await loadNotes();
      } catch (err) {
        toast('Error cargando datos: ' + err.message, 'error');
      }
    })();
  })();
  </script>
</body>
</html>
